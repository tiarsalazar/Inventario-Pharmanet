server:
    port: 8081

spring:
    application:
        name: sucursal-service
    profiles:
        active: dev
    output:
        ansi:
            enabled: ALWAYS

    datasource:
        url: jdbc:mysql://localhost:3306/bd_sucursal
        username: root
        password: 

    flyway:
        enabled: true
        locations: classpath:db/migration

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

springdoc:
    api-docs:
        enabled: true   
    swagger-ui:
        enabled: true
        path: /doc/swagger-ui

logging:
    file:
        name: logs/sucursal.log
        path: logs
    level:
        org:
            springframework:
                web: DEBUG
            hibernate:
                SQL: DEBUG
        root: DEBUG
    logback:
        rollingpolicy:
            max-file-size: 10MB
            max-history: 30