spring.application.name=usuario_service

server.port=8081

logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.root=INFO

spring.output.ansi.enabled=ALWAYS

spring.datasource.url=jdbc:mysql://localhost:3036/db_usuarios
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=NOMBRE_ESQUEMA

spring.flyway.enabled=true
spring.flyway.default-schema=NOMBRE_ESQUEMA
spring.flyway.schemas=NOMBRE_ESQUEMA
spring.flyway.locations=classpath:db/migrationS