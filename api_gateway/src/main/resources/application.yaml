server:
    port: 8081

spring:
    application:
        name: api-gateway

    cloud:
        gateway:
            routes:

                - id: usuario-service
                  uri: lb://USUARIO-SERVICE
                  predicates:
                    - Path=/api/v1/usuarios/**

                - id: sucursal-service
                  uri: lb://SUCURSAL-SERVICE
                  predicates:
                    - Path=/api/v1/sucursales/**

                - id: ubicacion-service
                  uri: lb://UBICACION-SERVICE
                  predicates:
                    - Path=/api/v1/ubicaciones/**

                - id: producto-service
                  uri: lb://PRODUCT-SERVICE
                  predicates:
                    - Path=/api/v1/productos/**
eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
