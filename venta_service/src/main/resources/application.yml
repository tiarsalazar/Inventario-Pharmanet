server:
    port: 8086

spring:
    application:
        name: venta-service
    profiles:
        active: dev
    output:
        ansi:
            enabled: ALWAYS

    datasource:
        url: jdbc:mysql://localhost:3306/bd_venta
        username: root
        password: 

    flyway:
        enabled: true
        locations: classpath:db/migration

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

springdoc:
    api-docs:
        enabled: true   
    swagger-ui:
        enabled: true
        path: /doc/swagger-ui

logging:
    file:
        name: logs/venta.log
        path: logs
    level:
        org:
            springframework:
                web: DEBUG
            hibernate:
                SQL: INFO
        root: INFO
    logback:
        rollingpolicy:
            max-file-size: 10MB
            max-history: 30

---
spring:
    config:
        activate:
            on-profile: dev
            
    datasource:
        url: jdbc:mysql://localhost:3306/bd_venta_dev
        username: root
        password: 
    jpa:
        hibernate:
            ddl-auto: update

        show-sql: true
        
---
spring:
    config:
        activate:
            on-profile: test

    datasource:
        url: jdbc:mysql://localhost:3306/bd_venta_test
        username: root
        password: 
    jpa:
        hibernate:
            ddl-auto: update

        show-sql: true