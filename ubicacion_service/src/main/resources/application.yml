server:
    port: 8087

spring:
    application:
        name: ubicacion-service
    profiles:
        active: dev
    output:
        ansi:
            enabled: ALWAYS

    datasource:
        url:  ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
    flyway:
        enabled: true
        locations: classpath:db/migration

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

springdoc:
    api-docs:
        enabled: true   
    swagger-ui:
        enabled: true
        path: /doc/swagger-ui

logging:
    file:
        name: logs/ubicacion.log
        path: logs
    level:
        org:
            springframework:
                web: DEBUG
            hibernate:
                SQL: INFO
        root: INFO
    logback:
        rollingpolicy:
            max-file-size: 10MB
            max-history: 30