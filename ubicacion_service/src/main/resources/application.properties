spring.application.name=ubicacion-service
server.port=8087

spring.profiles.active=dev

logging.file.name=logs/ubicacion.log
logging.file.path=logs
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=INFO
logging.level.root=INFO

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui

# Usa colores ANSI en la consola siempre
spring.output.ansi.enabled=ALWAYS

spring.datasource.url=jdbc:mysql://localhost:3306/bd_ubicacion
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration